<table
  cellpadding="0"
  cellspacing="8px"
  border="0"
  style="font-size: medium; font-family: Consolas, 'Courier New', Courier, monospace; padding: 2px;"
>
  <tbody>
    <tr>
      <!-- Avatar (Favicon) -->
      <td>
        <img
          alt="NeoDev Avatar"
          role="presentation"
          src="https://neo-dev.org/favicon.ico"
          style="display: block; width: 100px;;border-radius: 50%"
          width="100"
          data-cy="avatar-image"
        />
      </td>

      <!-- Spacer Avatar - Title -->
      <td
        style="width: 1px; height: auto; border-bottom: medium; border-left: 1px solid rgb(119, 74, 159);"
        width="1"
        aria-label="Divider"
      ></td>

      <!-- Title -->
      <td>
        <h2
          style="margin: 0px; font-size: 18px; font-family: Consolas, 'Courier New', Courier, monospace; color: rgb(27, 17, 44); font-weight: 600; line-height: 28px;"
        >
          <span>Nuno</span><span>&nbsp;</span><span>Dias</span>
        </h2>
        <p
          style="margin: 0px; color: rgb(27, 17, 44); font-size: 14px; line-height: 22px;"
        >
          <span>Tech</span><span>&nbsp;</span><span>Guy</span>
        </p>
        <div style="display: flex; gap: 8px; margin-top: 4px;">
          <a href="https://github.com/N4fta" style="text-decoration: none;">
            <img
              alt="GitHub"
              src="https://neo-dev.org/assets/icons/github.png"
              style="display: block; width: 16px; height: 16px;"
              width="16"
              height="16"
            />
          </a>
          <a
            href="https://discord.com/users/duk31468"
            style="text-decoration: none;"
          >
            <img
              alt="Discord"
              src="https://neo-dev.org/assets/icons/discord.png"
              style="display: block; width: 16px; height: 16px;"
              width="16"
              height="16"
            />
          </a>
          <a
            href="https://open.spotify.com/user/z20cuq7qcix1zz2xzlxg6egzl?si=78c503979e434939"
            style="text-decoration: none;"
          >
            <img
              alt="Spotify"
              src="https://neo-dev.org/assets/icons/spotify.png"
              style="display: block; width: 16px; height: 16px;"
              width="16"
              height="16"
            />
          </a>
        </div>
      </td>

      <!-- Spacer Title - Contact Details -->
      <td
        style="width: 1px; height: auto; border-bottom: medium; border-left: 1px solid rgb(119, 74, 159);"
        width="1"
        aria-label="Divider"
      ></td>

      <!-- Contact Details -->
      <td>
        <table
          cellpadding="0"
          cellspacing="0"
          border="0"
          style="font-size: medium; font-family: Consolas, 'Courier New', Courier, monospace; line-height: 1;"
        >
          <tbody>
            <tr style="vertical-align: middle; height: 28px;">
              <td width="26" style="vertical-align: middle;">
                <img
                  alt="Email"
                  src="https://neo-dev.org/assets/icons/mail.png"
                  style="display: block; width: 16px; height: 16px;"
                  width="16"
                  height="16"
                />
              </td>
              <td style="padding: 0px; color: rgb(27, 17, 44);">
                <a
                  href="mailto:nunocdias@neo-dev.org"
                  style="text-decoration: none; color: rgb(27, 17, 44); font-size: 14px;"
                  ><span>nunocdias@neo-dev.org</span></a
                >
              </td>
            </tr>
            <tr style="vertical-align: middle; height: 28px;">
              <td width="26" style="vertical-align: middle;">
                <img
                  alt="Website"
                  src="https://neo-dev.org/assets/icons/globe.png"
                  style="display: block; width: 16px; height: 16px;"
                  width="16"
                  height="16"
                />
              </td>
              <td style="padding: 0px; color: rgb(27, 17, 44);">
                <a
                  href="https://neo-dev.org"
                  style="text-decoration: none; color: rgb(27, 17, 44); font-size: 14px;"
                  ><span>neo-dev.org</span></a
                >
              </td>
            </tr>
            <tr style="vertical-align: middle; height: 28px;">
              <td width="26" style="vertical-align: middle;">
                <img
                  alt="Location"
                  src="https://neo-dev.org/assets/icons/location.png"
                  style="display: block; width: 16px; height: 16px;"
                  width="16"
                  height="16"
                />
              </td>
              <td style="padding: 0px; color: rgb(27, 17, 44);">
                <span style="font-size: 14px; color: rgb(27, 17, 44);"
                  ><span
                    >Brussels, Belgium || <br />
                    Eindhoven, The Netherlands</span
                  ></span
                >
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
